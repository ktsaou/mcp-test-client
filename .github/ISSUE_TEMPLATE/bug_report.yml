name: Bug report
description: Something broke or doesn't behave as expected.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as
        you can — minimal reproductions get fixed faster.

        **Before you submit**, please paste a diagnostic bundle in the
        "Diagnostics" field at the bottom. The easiest way to get one is to
        click **Report issue** in the app (it copies the bundle to your
        clipboard). If that button is unavailable, see
        [`docs/reporting-bugs.md`](https://github.com/ktsaou/mcp-test-client/blob/master/docs/reporting-bugs.md)
        for the console fallback.

        The bundle redacts bearer tokens and custom-header secrets
        automatically. It does **not** redact response payloads — review
        the JSON for anything sensitive before pasting.

  - type: input
    id: server-url
    attributes:
      label: MCP server URL you were connecting to (if public)
      description: Skip if private or sensitive.
    validations:
      required: false

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - Streamable HTTP
        - SSE (legacy)
        - WebSocket
        - Not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what did you see?
    validations:
      required: true

  - type: textarea
    id: schema
    attributes:
      label: Schema that failed to render (if applicable)
      description: Paste the offending tool/prompt/resource JSON Schema here.
      render: json
    validations:
      required: false

  - type: textarea
    id: browser
    attributes:
      label: Browser & OS
      description: e.g. Chrome 133 on macOS 14
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Browser console errors
      description: Open DevTools → Console. Paste any red errors here.
    validations:
      required: false

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics bundle
      description: |
        Paste the JSON copied by the app's **Report issue** button, or run
        `mcpClientDiagnostics()` in DevTools and paste the output. Auth
        tokens are redacted automatically; response payloads are not —
        review before submitting if your server returns sensitive data.
      render: json
    validations:
      required: false
