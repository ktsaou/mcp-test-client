<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Content Security Policy — see specs/security.md §4
         frame-ancestors is intentionally omitted here: browsers ignore it
         when delivered via <meta> (it only works as an HTTP response
         header). Clickjacking protection must therefore be set at the
         hosting layer — for the canonical deploy on GitHub Pages, that
         responsibility lies with whatever intermediary the user runs in
         front of index.html. Self-hosters who care should add
         `X-Frame-Options: DENY` or `Content-Security-Policy: frame-ancestors 'none'`
         at the web-server layer. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src *; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; base-uri 'self'; form-action 'none';"
    />

    <meta
      name="description"
      content="Browser-based test client for public Model Context Protocol (MCP) servers. Zero install, no backend."
    />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0d10" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f8fa" media="(prefers-color-scheme: light)" />

    <title>MCP Test Client</title>

    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
